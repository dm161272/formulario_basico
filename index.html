<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <title>Formulario</title>
</head>

<body>
    <form class="form-input">
        <h4>Formulario de entrada de datos</h4>
        <input class="controls" required="yes" type="text" name="cliente" id="cliente" placeholder="Nombre de cliente" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñÜü'\s\-]+" title="¡No se permiten caracteres numéricos ni especiales en este campo!">
        <input class="controls" required="yes" type="text" name="articulo" id="articulo" placeholder="Articulo">
        <input class="controls" required="yes" type="text" name="fecha-pedido" id="fech-pedido"
            placeholder="Fecha de pedido" onfocus="(this.type='date')" onblur="(this.type='text')">
        <input class="controls" required="yes" type="text" name="fecha-entrega" id="fecha-entrega"
            placeholder="Fecha de entrega" onfocus="(this.type='date')" onblur="(this.type='text')">
        <input class="controls" required="yes" type="text" name="ciudad" id="ciudad" placeholder="Ciudad" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñÜü'\s\-]+" title="¡No se permiten caracteres numéricos ni especiales en este campo!">
        <input class="controls" required="yes" type="text" name="pais" id="pais" placeholder="País" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñÜü'\s\-]+" title="¡No se permiten caracteres numéricos ni especiales en este campo!">
        <input class="controls" required="yes" type="number" name="cantidad" id="cantidad" placeholder="Cantidad"
            min="1" step="1">
        <input class="controls" type="number" name="descuento" id="descuento" placeholder="Descuento (%)" min="0" step="0.01">
        <input class="controls" type="number" name="iva" id="iva" placeholder="IVA" min="0" step="1">
        <input class="controls" required="yes" type="number" name="precio" id="precio" placeholder="Precio unitario"
            min="0.01" step="0.01">
        <input class="button" type="submit" value="Enviar">
        <input class="button-reset" type="reset" value="Borrar los datos">
    </form>
</body>

</html>
