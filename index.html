<!-- Cliente, Articulo, Fecha pedido, Fecha entrega, Ciudad, País, Cantidad, Descuento%, IVA, Precio unitario. -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <title>Formulario</title>
</head>

<body>
    <section class="form-input">
        <h4>Formulario de entrada de datos</h4>
        <input class="controls" type="text" name="cliente" id="cliente" placeholder="Nombre de cliente">
        <input class="controls" type="text" name="articulo" id="articulo" placeholder="Articulo">
        <input class="controls" type="date" name="fecha-pedido" id="fech-pedido" placeholder="Fecha de pedido">
        <input class="controls" type="date" name="fecha-entrega" id="fecha-entrega" placeholder="Fecha de entrega">
        <input class="controls" type="text" name="cuidad" id="cuidad" placeholder="Cuidad">
        <input class="controls" type="text" name="pais" id="pais" placeholder="País">
        <input class="controls" type="number" name="cantidad" id="cantidad" placeholder="Cantidad">
        <input class="controls" type="number" name="descuento" id="descuento" placeholder="Descuento (%)">
        <input class="controls" type="number" name="iva" id="iva" placeholder="IVA">
        <input class="controls" type="number" name="precio" id="precio" placeholder="Precio unitario">
        <input class="button" type="submit" value="Enviar">
    </section>

</body>

</html>l
